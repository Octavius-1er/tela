<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vidéo — Tela</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f1a;--surface:#161928;--surface2:#1e2235;--border:#2a2f4e;--text:#eef0ff;--muted:#7880b0;--coral:#ff6b6b;--teal:#4ecdc4;--gold:#ffd166}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* TOOLBAR */
.tb{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 10px;height:50px;flex-shrink:0;overflow-x:auto}
.tb::-webkit-scrollbar{display:none}
.tbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;transition:all .15s}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}
.tbtn.accent{background:var(--gold);border-color:var(--gold);color:#0d0f1a;font-weight:600}
.tbtn.accent:hover{filter:brightness(1.1)}
.tbtn.red{background:var(--coral);border-color:var(--coral);color:#fff}
.tbtn.play{background:var(--surface2);border-color:var(--teal);color:var(--teal);min-width:44px;font-size:16px}
.tsep{width:1px;background:var(--border);height:26px;margin:0 2px;flex-shrink:0}
#vtitle{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;width:160px;outline:none;padding:3px 7px;border-radius:5px}
#vtitle:focus{background:var(--surface2)}
.tright{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
/* MAIN */
.main{display:flex;flex:1;overflow:hidden}
/* PREVIEW */
.preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#090b14;padding:16px;overflow:hidden}
#pvcanv{position:relative;background:#000;border-radius:8px;overflow:hidden;flex-shrink:0}
#pvvid{width:100%;height:100%;object-fit:contain;display:block}
#pvcanvas{position:absolute;top:0;left:0;pointer-events:none}
.pvctrls{display:flex;align-items:center;gap:8px;margin-top:10px;width:100%;max-width:560px}
.pvctrls button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:14px;transition:.15s}
.pvctrls button:hover{border-color:var(--teal)}
#scrubber{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:var(--border);cursor:pointer}
#scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer}
#timedisp{font-size:11px;color:var(--muted);white-space:nowrap;min-width:72px;text-align:right}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sbtabs{display:flex;border-bottom:1px solid var(--border)}
.sbtab{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.sbtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.sbpane{flex:1;overflow-y:auto;padding:10px;display:none}
.sbpane.on{display:block}
.sbpane::-webkit-scrollbar{width:3px}
.sbpane::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* MEDIA LIST */
.mitem{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.mitem:hover{border-color:var(--gold)}
.mthumb{width:48px;height:32px;border-radius:4px;background:#000;object-fit:cover;flex-shrink:0}
.minfo{flex:1;min-width:0}
.mname{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mdur{font-size:10px;color:var(--muted)}
.madd{background:var(--gold);border:none;color:#0d0f1a;width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
/* TEXT OVERLAY CONFIG */
.psec{padding:0;margin-bottom:12px}
.psec h4{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.pinput{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-family:inherit;font-size:12px;width:100%}
.pinput:focus{outline:none;border-color:var(--gold)}
.prow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.prow label{font-size:11px;color:var(--muted);width:44px;flex-shrink:0}
.pirow{flex:1;min-width:0}
.pcolor{width:30px;height:26px;border-radius:5px;border:1px solid var(--border);cursor:pointer;padding:2px;background:var(--surface2)}
.addbtn{width:100%;background:var(--surface2);border:1px dashed var(--border);color:var(--muted);padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;transition:.15s;margin-bottom:10px}
.addbtn:hover{border-color:var(--gold);color:var(--gold)}
/* TIMELINE */
.tl{height:180px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
.tlhead{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border)}
.tlhead span{font-size:11px;color:var(--muted)}
.tlscroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:8px 12px;display:flex;flex-direction:column;gap:6px;position:relative}
.tlscroll::-webkit-scrollbar{height:4px}
.tlscroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tlrow{display:flex;align-items:center;gap:0;height:38px;position:relative}
.tlrow-label{width:72px;font-size:10px;color:var(--muted);flex-shrink:0;padding-right:8px;text-align:right}
.tltrack{position:relative;height:38px;flex:1;background:rgba(255,255,255,.02);border-radius:6px;overflow:visible}
.tlclip{position:absolute;top:2px;height:34px;border-radius:5px;cursor:pointer;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;border:1px solid rgba(255,255,255,.12);transition:filter .1s;touch-action:none}
.tlclip:hover{filter:brightness(1.15)}
.tlclip.sel{outline:2px solid #fff;outline-offset:1px}
.tlclip .tlname{overflow:hidden;text-overflow:ellipsis;flex:1}
.tlclip .tlx{margin-left:5px;opacity:.7;font-size:10px;cursor:pointer}
.tlclip .tlx:hover{opacity:1;color:#fff}
/* PLAYHEAD */
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--coral);pointer-events:none;z-index:50}
#playhead::before{content:'▼';position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--coral)}
/* EXPORT */
.expbar{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.expbar.on{display:flex}
.expbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:320px;text-align:center}
.expbox h3{font-family:'Fraunces',serif;font-size:20px;margin-bottom:10px}
.expbox p{color:var(--muted);font-size:13px;margin-bottom:18px}
.expprog{width:100%;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:14px}
.expprog div{height:100%;background:var(--gold);transition:width .3s;border-radius:4px}
.expbtn{background:var(--gold);border:none;color:#0d0f1a;font-family:inherit;font-size:14px;font-weight:700;padding:10px 24px;border-radius:9px;cursor:pointer;margin-top:8px;width:100%}
</style>
</head>
<body>
<div class="tb">
  <button class="tbtn" onclick="back()">← Accueil</button>
  <div class="tsep"></div>
  <input type="text" id="vtitle" value="Ma vidéo">
  <div class="tsep"></div>
  <button class="tbtn" onclick="trigVid()">🎬 Vidéo</button>
  <button class="tbtn" onclick="trigAud()">🎵 Audio</button>
  <button class="tbtn" onclick="showAddText()">T Texte</button>
  <div class="tsep"></div>
  <button class="tbtn" onclick="splitClip()">✂ Couper</button>
  <div class="tright">
    <button class="tbtn" onclick="loadF()">📂 Ouvrir</button>
    <button class="tbtn" onclick="saveF()">💾 Sauver</button>
    <button class="tbtn accent" onclick="exportVid()">⬇ Exporter</button>
  </div>
</div>

<div class="main">
  <div class="preview">
    <div id="pvcanv">
      <video id="pvvid" preload="metadata" playsinline></video>
      <canvas id="pvcanvas"></canvas>
    </div>
    <div class="pvctrls">
      <button id="pbtn" onclick="togglePlay()">▶</button>
      <input type="range" id="scrubber" min="0" max="100" step="0.1" value="0" oninput="seek(this.value)">
      <span id="timedisp">0:00 / 0:00</span>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sbtabs">
      <div class="sbtab on" onclick="showTab('media')">📁 Médias</div>
      <div class="sbtab" onclick="showTab('text')">T Texte</div>
      <div class="sbtab" onclick="showTab('clip')">🎞 Clip</div>
    </div>
    <div class="sbpane on" id="tab-media">
      <button class="addbtn" onclick="trigVid()">＋ Ajouter une vidéo</button>
      <button class="addbtn" onclick="trigAud()">＋ Ajouter de l'audio</button>
      <div id="medialist"></div>
    </div>
    <div class="sbpane" id="tab-text">
      <div class="psec"><h4>Nouveau texte</h4>
        <textarea id="ntxt" class="pinput" rows="3" placeholder="Votre texte..."></textarea>
      </div>
      <div class="prow"><label>Taille</label><input id="ntfs" type="number" class="pinput pirow" value="36"></div>
      <div class="prow"><label>Couleur</label><input type="color" id="ntcolor" class="pcolor" value="#ffffff"></div>
      <div class="prow"><label>Fond</label><input type="color" id="ntbg" class="pcolor" value="#000000"><input type="range" id="ntbga" min="0" max="255" value="120" class="pinput pirow"></div>
      <div class="prow"><label>Début</label><input id="nts" type="number" class="pinput pirow" step="0.1" value="0" min="0"></div>
      <div class="prow"><label>Durée</label><input id="ntd" type="number" class="pinput pirow" step="0.1" value="3" min="0.5"></div>
      <button class="addbtn" onclick="addTextClip()">＋ Ajouter ce texte</button>
    </div>
    <div class="sbpane" id="tab-clip">
      <div id="clipprops"><p style="color:var(--muted);font-size:12px">Cliquez sur un clip pour le modifier.</p></div>
    </div>
  </aside>
</div>

<!-- TIMELINE -->
<div class="tl">
  <div class="tlhead">
    <span>📏 Timeline</span>
    <span id="tlzoom" style="margin-left:auto">Zoom:</span>
    <button class="tbtn" onclick="zoom(-20)" style="padding:2px 8px;font-size:11px">−</button>
    <button class="tbtn" onclick="zoom(20)" style="padding:2px 8px;font-size:11px">＋</button>
  </div>
  <div class="tlscroll" id="tlscroll">
    <div class="tlrow"><span class="tlrow-label">Vidéo</span><div class="tltrack" id="tl-video"><div id="playhead"></div></div></div>
    <div class="tlrow"><span class="tlrow-label">Audio</span><div class="tltrack" id="tl-audio"></div></div>
    <div class="tlrow"><span class="tlrow-label">Textes</span><div class="tltrack" id="tl-text"></div></div>
  </div>
</div>

<div class="expbar" id="expbar">
  <div class="expbox">
    <h3>🎬 Export en cours…</h3>
    <p id="expmsg">Préparation…</p>
    <div class="expprog"><div id="expprogb" style="width:0%"></div></div>
    <p id="expstatus" style="font-size:11px;color:var(--muted)"></p>
    <button class="expbtn" id="expclosebtn" style="display:none" onclick="document.getElementById('expbar').classList.remove('on')">Fermer</button>
  </div>
</div>

<input type="file" id="vidup" accept="video/*" style="display:none" onchange="onVid(event)">
<input type="file" id="audup" accept="audio/*" style="display:none" onchange="onAud(event)">
<input type="file" id="fileload" accept=".tela,.json" style="display:none" onchange="onLoad(event)">

<script>
const qp=new URLSearchParams(location.search);
let S={
  id:qp.get('id')||Date.now().toString(),
  type:'video',
  title:decodeURIComponent(qp.get('title')||'Ma vidéo'),
  clips:[],texts:[],audio:[],
  duration:0,
  created:Date.now(),updated:Date.now()
};
let pxPerSec=80;let totalDur=10;
let curTime=0;let playing=false;let raf=null;
let activeVidEl=null;let selClipId=null;
let mediaStore={};// id -> blob url

function init(){
  document.getElementById('vtitle').value=S.title;
  document.getElementById('vtitle').onchange=()=>{S.title=document.getElementById('vtitle').value;autosave()};
  const raw=localStorage.getItem('tela_project_'+S.id);
  if(raw){try{const d=JSON.parse(raw);Object.assign(S,d)}catch{}}
  resizePv();
  window.addEventListener('resize',resizePv);
  document.addEventListener('keydown',onKey);
  renderTimeline();updateTime();
}

function resizePv(){
  const pv=document.getElementById('pvcanv');
  const area=pv.parentElement;
  const aw=area.clientWidth-32;const ah=area.clientHeight-70;
  const w=Math.min(aw,560);const h=w*9/16;
  pv.style.width=w+'px';pv.style.height=Math.min(h,ah)+'px';
  const cv=document.getElementById('pvcanvas');
  cv.width=w;cv.height=Math.min(h,ah);
}

// MEDIA
function trigVid(){document.getElementById('vidup').click()}
function trigAud(){document.getElementById('audup').click()}

function onVid(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const vid=document.createElement('video');
  vid.preload='metadata';
  vid.onloadedmetadata=()=>{
    const id='v'+Date.now();
    const dur=vid.duration;
    const start=S.clips.length?Math.max(...S.clips.map(c=>c.start+c.duration)):0;
    const clip={id,type:'video',name:f.name,mediaId:id,start,duration:Math.round(dur*10)/10,trimIn:0,trimOut:dur,transition:'none'};
    S.clips.push(clip);
    mediaStore[id]=url;
    totalDur=Math.max(totalDur,start+clip.duration)+1;
    renderTimeline();renderMedia();autosave();
    if(S.clips.length===1){loadClip(clip)}
  };
  vid.src=url;
  e.target.value='';
}

function onAud(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const aud=new Audio();
  aud.onloadedmetadata=()=>{
    const id='a'+Date.now();
    const dur=aud.duration;
    const clip={id,type:'audio',name:f.name,mediaId:id,start:0,duration:Math.round(dur*10)/10};
    S.audio.push(clip);
    mediaStore[id]=url;
    totalDur=Math.max(totalDur,clip.duration)+1;
    renderTimeline();renderMedia();autosave();
  };
  aud.src=url;
  e.target.value='';
}

function addTextClip(){
  const txt=document.getElementById('ntxt').value.trim();
  if(!txt)return;
  const tc={
    id:'t'+Date.now(),type:'text',
    text:txt,
    fs:parseInt(document.getElementById('ntfs').value)||36,
    color:document.getElementById('ntcolor').value,
    bg:document.getElementById('ntbg').value,
    bga:parseInt(document.getElementById('ntbga').value)||120,
    x:0.5,y:0.85,
    start:parseFloat(document.getElementById('nts').value)||0,
    duration:parseFloat(document.getElementById('ntd').value)||3
  };
  S.texts.push(tc);
  totalDur=Math.max(totalDur,tc.start+tc.duration)+1;
  renderTimeline();autosave();
  document.getElementById('ntxt').value='';
}

function showAddText(){showTab('text')}
function showTab(name){
  document.querySelectorAll('.sbtab').forEach((t,i)=>{t.classList.toggle('on',['media','text','clip'][i]===name)});
  document.querySelectorAll('.sbpane').forEach(p=>{p.classList.toggle('on',p.id==='tab-'+name)});
}

// PLAYBACK
function loadClip(clip){
  if(!mediaStore[clip.mediaId])return;
  const vid=document.getElementById('pvvid');
  vid.src=mediaStore[clip.mediaId];
  vid.currentTime=clip.trimIn||0;
  activeVidEl=vid;
}

function togglePlay(){
  if(playing)pause();else play();
}
function play(){
  playing=true;document.getElementById('pbtn').textContent='⏸';
  if(raf)cancelAnimationFrame(raf);
  let last=performance.now();
  function tick(now){
    if(!playing)return;
    const dt=(now-last)/1000;last=now;
    curTime=Math.min(curTime+dt,totalDur);
    syncMedia();updateTime();
    if(curTime>=totalDur){pause();curTime=0;updateTime();return}
    raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);
  // play video
  const activeClip=S.clips.find(c=>curTime>=c.start&&curTime<c.start+c.duration);
  if(activeClip&&mediaStore[activeClip.mediaId]){
    const vid=document.getElementById('pvvid');
    vid.src=mediaStore[activeClip.mediaId];
    vid.currentTime=(activeClip.trimIn||0)+(curTime-activeClip.start);
    vid.play().catch(()=>{});
  }
}
function pause(){
  playing=false;document.getElementById('pbtn').textContent='▶';
  if(raf){cancelAnimationFrame(raf);raf=null}
  document.getElementById('pvvid').pause();
}
function seek(pct){
  curTime=totalDur*pct/100;
  syncMedia();updateTime();
}
function syncMedia(){
  const vid=document.getElementById('pvvid');
  const ac=S.clips.find(c=>curTime>=c.start&&curTime<c.start+c.duration);
  if(ac){
    const wanted=mediaStore[ac.mediaId];
    if(vid.src!==wanted){vid.src=wanted;if(playing)vid.play().catch(()=>{})}
    const t=(ac.trimIn||0)+(curTime-ac.start);
    if(Math.abs(vid.currentTime-t)>0.3)vid.currentTime=t;
  } else{vid.pause();vid.src='';}
  drawOverlays();
}
function drawOverlays(){
  const cv=document.getElementById('pvcanvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const w=cv.width,h=cv.height;
  S.texts.forEach(tc=>{
    if(curTime<tc.start||curTime>tc.start+tc.duration)return;
    ctx.save();
    const fs=Math.round(tc.fs*w/960);
    ctx.font=`bold ${fs}px ${tc.fontFamily||'Arial'}`;
    ctx.textAlign='center';
    const lines=tc.text.split('\n');
    const lh=fs*1.35;
    const bx=w*tc.x,by=h*tc.y;
    const bw=ctx.measureText(tc.text).width+fs;const bh=lh*lines.length+fs*.5;
    // bg
    const r2=parseInt(tc.bg.slice(1,3),16),g2=parseInt(tc.bg.slice(3,5),16),b2=parseInt(tc.bg.slice(5,7),16);
    ctx.fillStyle=`rgba(${r2},${g2},${b2},${(tc.bga||120)/255})`;
    ctx.beginPath();const pad=fs*.4;
    ctx.roundRect(bx-bw/2-pad,by-bh/2-pad,bw+pad*2,bh+pad*2,8);
    ctx.fill();
    ctx.fillStyle=tc.color||'#fff';
    lines.forEach((line,i)=>{
      ctx.fillText(line,bx,by+(i-(lines.length-1)/2)*lh);
    });
    ctx.restore();
  });
}
function updateTime(){
  const sc=document.getElementById('scrubber');
  sc.value=totalDur?curTime/totalDur*100:0;
  document.getElementById('timedisp').textContent=fmt(curTime)+' / '+fmt(totalDur);
  // Move playhead
  const ph=document.getElementById('playhead');
  ph.style.left=(curTime*pxPerSec)+'px';
}
function fmt(s){const m=Math.floor(s/60);return m+':'+(Math.floor(s%60)+'').padStart(2,'0')}

// TIMELINE
function renderTimeline(){
  totalDur=10;
  [...S.clips,...S.audio,...S.texts].forEach(c=>{totalDur=Math.max(totalDur,(c.start||0)+(c.duration||0)+1)});
  renderTrack('tl-video',S.clips,'#4ecdc455','#4ecdc4');
  renderTrack('tl-audio',S.audio,'#ffd16655','#ffd166');
  renderTrack('tl-text',S.texts,'#ff6b6b55','#ff6b6b');
  document.getElementById('tlscroll').style.minWidth=(totalDur*pxPerSec+100)+'px';
}

function renderTrack(id,clips,bg,border){
  const track=document.getElementById(id);
  const cur=track.querySelector('#playhead');
  track.innerHTML='';
  if(cur)track.appendChild(cur);
  clips.forEach(c=>{
    const d=document.createElement('div');
    d.className='tlclip'+(c.id===selClipId?' sel':'');
    d.style.cssText=`left:${(c.start||0)*pxPerSec}px;width:${c.duration*pxPerSec}px;background:${bg};border-color:${border}`;
    const name=c.name||c.text||'Clip';
    d.innerHTML=`<span class="tlname">${name.length>18?name.substring(0,15)+'…':name}</span><span class="tlx" title="Supprimer" onclick="delClip('${c.id}',event)">✕</span>`;
    d.addEventListener('pointerdown',ev=>{
      ev.stopPropagation();selClipId=c.id;
      renderTimeline();showClipProps(c);showTab('clip');
      startClipDrag(ev,c,d);
    });
    d.addEventListener('click',()=>{curTime=c.start;updateTime();syncMedia()});
    track.appendChild(d);
  });
}

function startClipDrag(e,clip,d){
  e.preventDefault();d.setPointerCapture(e.pointerId);
  const sx=e.clientX,os=clip.start;
  const mv=e2=>{
    clip.start=Math.max(0,Math.round((os+(e2.clientX-sx)/pxPerSec)*10)/10);
    d.style.left=(clip.start*pxPerSec)+'px';
  };
  const up=()=>{d.removeEventListener('pointermove',mv);d.removeEventListener('pointerup',up);renderTimeline();autosave()};
  d.addEventListener('pointermove',mv);d.addEventListener('pointerup',up);
}

function delClip(id,e){
  if(e)e.stopPropagation();
  S.clips=S.clips.filter(c=>c.id!==id);
  S.audio=S.audio.filter(c=>c.id!==id);
  S.texts=S.texts.filter(c=>c.id!==id);
  if(selClipId===id)selClipId=null;
  renderTimeline();renderMedia();autosave();
}

function splitClip(){
  const clip=S.clips.find(c=>curTime>c.start&&curTime<c.start+c.duration);
  if(!clip){alert('Placez la tête de lecture sur un clip vidéo');return}
  const splitAt=curTime-clip.start;
  const newClip={...clip,id:'v'+Date.now(),start:curTime,trimIn:(clip.trimIn||0)+splitAt,duration:clip.duration-splitAt};
  clip.duration=splitAt;
  S.clips.push(newClip);
  renderTimeline();autosave();
}

function zoom(delta){pxPerSec=Math.max(20,Math.min(300,pxPerSec+delta));renderTimeline()}

function showClipProps(c){
  const cp=document.getElementById('clipprops');
  if(c.type==='text'){
    cp.innerHTML=`
      <div class="psec"><h4>Texte</h4>
        <textarea class="pinput" rows="3" id="cp-text" oninput="updC('${c.id}','text',this.value)">${c.text||''}</textarea>
      </div>
      <div class="prow"><label>Taille</label><input class="pinput pirow" type="number" value="${c.fs||36}" oninput="updC('${c.id}','fs',+this.value)"></div>
      <div class="prow"><label>Couleur</label><input type="color" class="pcolor" value="${c.color||'#ffffff'}" onchange="updC('${c.id}','color',this.value)"></div>
      <div class="prow"><label>Début</label><input class="pinput pirow" type="number" step="0.1" value="${c.start}" oninput="updC('${c.id}','start',+this.value)"></div>
      <div class="prow"><label>Durée</label><input class="pinput pirow" type="number" step="0.1" value="${c.duration}" oninput="updC('${c.id}','duration',+this.value)"></div>
      <button class="addbtn" style="margin-top:8px;color:var(--coral);border-color:rgba(255,107,107,.3)" onclick="delClip('${c.id}')">🗑 Supprimer</button>`;
  } else{
    cp.innerHTML=`
      <div class="psec"><h4>Clip: ${c.name||'vidéo'}</h4></div>
      <div class="prow"><label>Début</label><input class="pinput pirow" type="number" step="0.1" value="${c.start}" oninput="updC('${c.id}','start',+this.value)"></div>
      <div class="prow"><label>Durée</label><input class="pinput pirow" type="number" step="0.1" value="${c.duration}" oninput="updC('${c.id}','duration',+this.value)"></div>
      <div class="prow"><label>Transition</label>
        <select class="pinput pirow" onchange="updC('${c.id}','transition',this.value)">
          <option value="none" ${c.transition==='none'?'sel':''}>Aucune</option>
          <option value="fade" ${c.transition==='fade'?'sel':''}>Fondu</option>
        </select>
      </div>
      <button class="addbtn" style="margin-top:8px;color:var(--coral);border-color:rgba(255,107,107,.3)" onclick="delClip('${c.id}')">🗑 Supprimer</button>`;
  }
}

function updC(id,key,val){
  const clip=[...S.clips,...S.audio,...S.texts].find(c=>c.id===id);
  if(!clip)return;clip[key]=val;renderTimeline();autosave();
}

function renderMedia(){
  const ml=document.getElementById('medialist');
  const all=[...S.clips,...S.audio];
  if(!all.length){ml.innerHTML='<p style="color:var(--muted);font-size:12px">Aucun média importé.</p>';return}
  ml.innerHTML=all.map(c=>`
    <div class="mitem" onclick="curTime=c.start;updateTime();syncMedia()">
      ${c.type==='video'?`<video class="mthumb" src="${mediaStore[c.mediaId]||''}" muted></video>`:`<div class="mthumb" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px">🎵</div>`}
      <div class="minfo"><div class="mname">${c.name||'Média'}</div><div class="mdur">${fmt(c.duration)}</div></div>
      <button class="madd" onclick="event.stopPropagation();curTime=${c.start}">▶</button>
    </div>`).join('');
}

// EXPORT
async function exportVid(){
  const bar=document.getElementById('expbar');bar.classList.add('on');
  const msg=document.getElementById('expmsg');const prg=document.getElementById('expprogb');
  const stat=document.getElementById('expstatus');
  document.getElementById('expclosebtn').style.display='none';
  msg.textContent='Initialisation de l\'export…';prg.style.width='5%';
  try{
    const cv=document.getElementById('pvcanvas');
    const vid=document.getElementById('pvvid');
    const w=cv.width,h=cv.height;
    const fps=25;const stream=cv.captureStream(fps);
    // Add audio from first video clip
    if(S.clips.length&&mediaStore[S.clips[0].mediaId]){
      try{
        const vc=document.createElement('video');vc.src=mediaStore[S.clips[0].mediaId];vc.muted=false;
        const actx=new AudioContext();const src2=actx.createMediaElementSource(vc);
        const dest=actx.createMediaStreamDestination();src2.connect(dest);
        dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));
      }catch{}
    }
    const chunks=[];
    const mr=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:5000000});
    mr.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    const done=new Promise(res=>{mr.onstop=res});
    mr.start(100);
    // Render frames
    const ctx=cv.getContext('2d');
    const step=1/fps;let t=0;
    pause();curTime=0;
    while(t<=totalDur){
      curTime=t;
      const ac=S.clips.find(c=>t>=c.start&&t<c.start+c.duration);
      ctx.clearRect(0,0,w,h);
      if(ac&&mediaStore[ac.mediaId]){
        if(vid.src!==mediaStore[ac.mediaId])vid.src=mediaStore[ac.mediaId];
        vid.currentTime=(ac.trimIn||0)+(t-ac.start);
        await new Promise(r=>setTimeout(r,40));
        ctx.drawImage(vid,0,0,w,h);
      } else{ctx.fillStyle='#000';ctx.fillRect(0,0,w,h)}
      drawOverlays();
      t=Math.round((t+step)*1000)/1000;
      const pct=Math.round(t/totalDur*90)+5;
      prg.style.width=pct+'%';
      msg.textContent=`Export… ${fmt(t)} / ${fmt(totalDur)}`;
      await new Promise(r=>requestAnimationFrame(r));
    }
    mr.stop();await done;
    prg.style.width='100%';msg.textContent='Finalisation…';
    const blob=new Blob(chunks,{type:'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=(S.title||'video')+'.webm';a.click();
    msg.textContent='✅ Export terminé !';stat.textContent='Fichier .webm téléchargé.';
    document.getElementById('expclosebtn').style.display='block';
  }catch(err){
    msg.textContent='❌ Erreur : '+err.message;
    document.getElementById('expclosebtn').style.display='block';
  }
}

// SAVE/LOAD
function autosave(){
  S.updated=Date.now();
  const toSave={...S};
  delete toSave.mediaData;// don't save blob data
  localStorage.setItem('tela_project_'+S.id,JSON.stringify(toSave));
  try{
    const all=JSON.parse(localStorage.getItem('tela_projects')||'[]');
    const i=all.findIndex(p=>p.id===S.id);
    const e={id:S.id,type:'video',title:S.title,created:S.created,updated:S.updated};
    if(i>=0)all[i]=e;else all.unshift(e);
    localStorage.setItem('tela_projects',JSON.stringify(all));
  }catch{}
}
function saveF(){
  const b=new Blob([JSON.stringify({...S},null,2)],{type:'application/octet-stream'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=(S.title||'video')+'.tela';a.click();
}
function loadF(){document.getElementById('fileload').click()}
function onLoad(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.type!=='video'){alert('Pas un projet vidéo');return}
      Object.assign(S,d);
      document.getElementById('vtitle').value=S.title;
      renderTimeline();renderMedia();
    }catch{alert('Fichier invalide')}
  };
  r.readAsText(f);e.target.value='';
}

function back(){if(confirm('Retour ?'))window.location.href='index.html'}
function onKey(e){
  if(e.key===' '&&!e.target.matches('input,textarea')){e.preventDefault();togglePlay()}
  if(e.key==='Escape'){pause()}
}

init();
</script>
